<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS GATE - بوابة الغاز</title>
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
        }
        .gate-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .gate-icon {
            font-size: 5rem;
            color: #0d6efd;
            margin-bottom: 1rem;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #333;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }
        .btn-giant {
            font-size: 2.5rem;
            padding: 1.5rem 3rem;
            border-radius: 60px;
            background: linear-gradient(45deg, #0d6efd, #0b5ed7);
            border: none;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(13,110,253,0.4);
            text-decoration: none;
            display: inline-block;
        }
        .btn-giant:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(13,110,253,0.6);
        }
        .btn-giant i {
            margin-left: 15px;
        }
        @media (max-width: 576px) {
            .btn-giant {
                font-size: 1.8rem;
                padding: 1.2rem 2rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="gate-card">
        <div class="gate-icon">
            <i class="fa-solid fa-gas-pump"></i>
        </div>
        <h1>GAS GATE</h1>
        <div class="subtitle">بوابة توزيع الغاز</div>
        <a href="login.html" class="btn-giant">
            <i class="fa-solid fa-arrow-left"></i> ادخل إلى البوابة
        </a>
    </div>
</body>
</html>
